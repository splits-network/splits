apiVersion: apps/v1
kind: Deployment
metadata:
    name: onboarding-service
    namespace: splits-network
spec:
    replicas: ${REPLICAS:-2}
    selector:
        matchLabels:
            app: onboarding-service
    template:
        metadata:
            labels:
                app: onboarding-service
        spec:
            nodeSelector:
                agentpool: userpool
            tolerations:
                - key: "kubernetes.azure.com/scalesetpriority"
                  operator: "Equal"
                  value: "spot"
                  effect: "NoSchedule"
            containers:
                - name: onboarding-service
                  image: ${ACR_SERVER}/onboarding-service:${IMAGE_TAG}
                  ports:
                      - containerPort: 3023
                        name: http
                  env:
                      - name: NODE_ENV
                        value: "production"
                      - name: PORT
                        value: "3023"
                      - name: SUPABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-url
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-anon-key
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-service-role-key
                      - name: RABBITMQ_URL
                        value: "amqp://splits:splits_production@rabbitmq:5672"
                      - name: INTERNAL_SERVICE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: internal-service-secrets
                                key: internal-service-key
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3023
                      initialDelaySeconds: 30
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 3023
                      initialDelaySeconds: 10
                      periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
    name: onboarding-service
    namespace: splits-network
spec:
    type: ClusterIP
    ports:
        - port: 3023
          targetPort: 3023
          name: http
    selector:
        app: onboarding-service
