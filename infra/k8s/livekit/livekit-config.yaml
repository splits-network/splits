apiVersion: v1
kind: ConfigMap
metadata:
    name: livekit-config
    namespace: splits-network
data:
    livekit.yaml: |
        port: 7880
        rtc:
            port_range_start: 50000
            port_range_end: 60000
            use_external_ip: true
        turn:
            enabled: true
            domain: ${LIVEKIT_TURN_DOMAIN}
            tls_port: 443
            udp_port: 3478
        room:
            max_participants: 10
            empty_timeout: 300
        redis:
            address: redis:6379
        keys:
            ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
        webhook:
            urls:
                - http://video-service:3019/api/v2/calls/recording/webhook
            api_key: ${LIVEKIT_API_KEY}
