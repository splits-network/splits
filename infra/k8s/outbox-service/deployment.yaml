apiVersion: apps/v1
kind: Deployment
metadata:
    name: outbox-service
    namespace: splits-network
spec:
    # Single replica — only one worker should drain the outbox table
    replicas: 1
    selector:
        matchLabels:
            app: outbox-service
    template:
        metadata:
            labels:
                app: outbox-service
        spec:
            nodeSelector:
                agentpool: userpool
            tolerations:
                - key: "kubernetes.azure.com/scalesetpriority"
                  operator: "Equal"
                  value: "spot"
                  effect: "NoSchedule"
            containers:
                - name: outbox-service
                  image: ${ACR_SERVER}/outbox-service:${IMAGE_TAG}
                  ports:
                      - containerPort: 3013
                        name: http
                  env:
                      - name: NODE_ENV
                        value: "production"
                      - name: PORT
                        value: "3013"
                      - name: SUPABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-url
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-anon-key
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-service-role-key
                      - name: RABBITMQ_URL
                        value: "amqp://splits:splits_production@rabbitmq:5672"
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3013
                      initialDelaySeconds: 30
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 3013
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      timeoutSeconds: 5
                      failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
    name: outbox-service
    namespace: splits-network
spec:
    selector:
        app: outbox-service
    ports:
        - protocol: TCP
          port: 3013
          targetPort: 3013
    type: ClusterIP
