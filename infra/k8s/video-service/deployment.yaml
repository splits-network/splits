apiVersion: apps/v1
kind: Deployment
metadata:
    name: video-service
    namespace: splits-network
spec:
    replicas: ${REPLICAS:-2}
    selector:
        matchLabels:
            app: video-service
    template:
        metadata:
            labels:
                app: video-service
        spec:
            nodeSelector:
                agentpool: userpool
            tolerations:
                - key: "kubernetes.azure.com/scalesetpriority"
                  operator: "Equal"
                  value: "spot"
                  effect: "NoSchedule"
            containers:
                - name: video-service
                  image: ${ACR_SERVER}/video-service:${IMAGE_TAG}
                  ports:
                      - containerPort: 3019
                        name: http
                  env:
                      - name: NODE_ENV
                        value: "production"
                      - name: PORT
                        value: "3019"
                      - name: SUPABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-url
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-anon-key
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-service-role-key
                      - name: RABBITMQ_URL
                        value: "amqp://splits:splits_production@rabbitmq:5672"
                      - name: LIVEKIT_API_KEY
                        valueFrom:
                            secretKeyRef:
                                name: livekit-secrets
                                key: livekit-api-key
                      - name: LIVEKIT_API_SECRET
                        valueFrom:
                            secretKeyRef:
                                name: livekit-secrets
                                key: livekit-api-secret
                      - name: LIVEKIT_URL
                        value: "ws://livekit:7880"
                      # Azure Blob Storage credentials for egress requests
                      - name: AZURE_STORAGE_ACCOUNT_NAME
                        valueFrom:
                            secretKeyRef:
                                name: azure-blob-secrets
                                key: account-name
                      - name: AZURE_STORAGE_ACCOUNT_KEY
                        valueFrom:
                            secretKeyRef:
                                name: azure-blob-secrets
                                key: account-key
                      - name: AZURE_STORAGE_CONTAINER_NAME
                        valueFrom:
                            secretKeyRef:
                                name: azure-blob-secrets
                                key: container-name
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3019
                      initialDelaySeconds: 30
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 3019
                      initialDelaySeconds: 10
                      periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
    name: video-service
    namespace: splits-network
spec:
    type: ClusterIP
    ports:
        - port: 80
          targetPort: 3019
          name: http
    selector:
        app: video-service
