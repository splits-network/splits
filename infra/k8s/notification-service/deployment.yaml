apiVersion: apps/v1
kind: Deployment
metadata:
    name: notification-service
    namespace: splits-network
spec:
    # IMPORTANT: Keep at 1 replica to avoid Resend API rate limiting conflicts
    # Multiple replicas consume the same RabbitMQ events and send duplicate emails
    replicas: ${REPLICAS:-2}
    selector:
        matchLabels:
            app: notification-service
    template:
        metadata:
            labels:
                app: notification-service
        spec:
            nodeSelector:
                agentpool: userpool
            tolerations:
                - key: "kubernetes.azure.com/scalesetpriority"
                  operator: "Equal"
                  value: "spot"
                  effect: "NoSchedule"
            containers:
                - name: notification-service
                  image: ${ACR_SERVER}/notification-service:${IMAGE_TAG}
                  ports:
                      - containerPort: 3005
                        name: http
                  env:
                      - name: NODE_ENV
                        value: "production"
                      - name: PORT
                        value: "3005"
                      - name: SENTRY_DSN
                        value: "https://0f635f7b6d478706e520431cc1d4f990@o4510570789732352.ingest.us.sentry.io/4510570905600000"
                      - name: SUPABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-url
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-anon-key
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-service-role-key
                      - name: RABBITMQ_URL
                        value: "amqp://splits:splits_production@rabbitmq:5672"
                      - name: RESEND_API_KEY
                        valueFrom:
                            secretKeyRef:
                                name: resend-secrets
                                key: resend-api-key
                      - name: RESEND_FROM_EMAIL
                        value: "noreply@updates.splits.network"
                      - name: PORTAL_URL
                        value: "${PORTAL_URL}"
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3005
                      initialDelaySeconds: 60
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 3005
                      initialDelaySeconds: 15
                      periodSeconds: 5
                      timeoutSeconds: 5
                      failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
    name: notification-service
    namespace: splits-network
spec:
    type: ClusterIP
    ports:
        - port: 3005
          targetPort: 3005
          name: http
    selector:
        app: notification-service
