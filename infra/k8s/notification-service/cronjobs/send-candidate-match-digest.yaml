apiVersion: batch/v1
kind: CronJob
metadata:
    name: notification-service-candidate-match-digest
    namespace: splits-network
    labels:
        app: notification-service
        component: cron
        job-type: candidate-match-digest
spec:
    # Every Monday at 8 AM UTC
    schedule: "0 8 * * 1"

    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3

    jobTemplate:
        metadata:
            labels:
                app: notification-service
                component: cron
                job-type: candidate-match-digest
        spec:
            activeDeadlineSeconds: 600
            backoffLimit: 0

            template:
                metadata:
                    labels:
                        app: notification-service
                        component: cron
                        job-type: candidate-match-digest
                spec:
                    restartPolicy: Never

                    containers:
                        - name: candidate-match-digest
                          image: ${ACR_SERVER}/notification-service:${IMAGE_TAG}
                          imagePullPolicy: Always

                          command: ["node"]
                          args:
                              [
                                  "services/notification-service/dist/jobs/send-candidate-match-digest.js",
                              ]

                          env:
                              - name: SUPABASE_URL
                                valueFrom:
                                    secretKeyRef:
                                        name: supabase-secrets
                                        key: supabase-url
                              - name: SUPABASE_SERVICE_ROLE_KEY
                                valueFrom:
                                    secretKeyRef:
                                        name: supabase-secrets
                                        key: supabase-service-role-key
                              - name: RESEND_API_KEY
                                valueFrom:
                                    secretKeyRef:
                                        name: resend-secrets
                                        key: resend-api-key
                              - name: FROM_EMAIL
                                value: "Applicant Network <notifications@applicant.network>"
                              - name: NEXT_PUBLIC_PORTAL_URL
                                value: "https://splits.network"
                              - name: NODE_ENV
                                value: "production"
                              - name: LOG_LEVEL
                                value: "info"

                          resources:
                              requests:
                                  memory: "256Mi"
                                  cpu: "250m"
                              limits:
                                  memory: "512Mi"
                                  cpu: "500m"
