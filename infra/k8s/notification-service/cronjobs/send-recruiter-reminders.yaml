apiVersion: batch/v1
kind: CronJob
metadata:
    name: notification-service-recruiter-reminders
    namespace: splits-network
    labels:
        app: notification-service
        component: cron
        job-type: recruiter-reminders
spec:
    # Every Thursday at 9 AM UTC
    schedule: "0 9 * * 4"

    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3

    jobTemplate:
        metadata:
            labels:
                app: notification-service
                component: cron
                job-type: recruiter-reminders
        spec:
            activeDeadlineSeconds: 600
            backoffLimit: 0

            template:
                metadata:
                    labels:
                        app: notification-service
                        component: cron
                        job-type: recruiter-reminders
                spec:
                    nodeSelector:
                        agentpool: userpool
                    tolerations:
                        - key: "kubernetes.azure.com/scalesetpriority"
                          operator: "Equal"
                          value: "spot"
                          effect: "NoSchedule"
                    restartPolicy: Never

                    containers:
                        - name: recruiter-reminders
                          image: ${ACR_SERVER}/notification-service:${IMAGE_TAG}
                          imagePullPolicy: Always

                          command: ["node"]
                          args:
                              [
                                  "services/notification-service/dist/jobs/send-recruiter-reminders.js",
                              ]

                          env:
                              - name: SUPABASE_URL
                                valueFrom:
                                    secretKeyRef:
                                        name: supabase-secrets
                                        key: supabase-url
                              - name: SUPABASE_SERVICE_ROLE_KEY
                                valueFrom:
                                    secretKeyRef:
                                        name: supabase-secrets
                                        key: supabase-service-role-key
                              - name: RESEND_API_KEY
                                valueFrom:
                                    secretKeyRef:
                                        name: resend-secrets
                                        key: resend-api-key
                              - name: FROM_EMAIL
                                value: "Splits Network <notifications@splits.network>"
                              - name: RESEND_CANDIDATE_FROM_EMAIL
                                value: "notifications@updates.applicant.network"
                              - name: PORTAL_URL
                                value: "${PORTAL_URL}"
                              - name: NODE_ENV
                                value: "production"
                              - name: LOG_LEVEL
                                value: "info"

                          resources:
                              requests:
                                  memory: "256Mi"
                                  cpu: "250m"
                              limits:
                                  memory: "512Mi"
                                  cpu: "500m"
