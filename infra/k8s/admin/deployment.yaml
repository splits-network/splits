apiVersion: apps/v1
kind: Deployment
metadata:
    name: admin
    namespace: splits-network
spec:
    replicas: 1
    selector:
        matchLabels:
            app: admin
    template:
        metadata:
            labels:
                app: admin
        spec:
            containers:
                - name: admin
                  image: ${ACR_SERVER}/admin:${IMAGE_TAG}
                  ports:
                      - containerPort: 3200
                        name: http
                  env:
                      - name: NODE_ENV
                        value: "production"
                      - name: PORT
                        value: "3200"
                      - name: NEXT_PUBLIC_ADMIN_GATEWAY_URL
                        value: "https://admin.api.employment-networks.com"
                      - name: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: clerk-secrets
                                key: admin-clerk-publishable-key
                      - name: CLERK_SECRET_KEY
                        valueFrom:
                            secretKeyRef:
                                name: clerk-secrets
                                key: admin-clerk-secret-key
                      - name: NEXT_PUBLIC_CLERK_SIGN_IN_URL
                        value: "/sign-in"
                      - name: NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL
                        value: "/secure"
                      - name: NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL
                        value: "/secure"
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 3200
                      initialDelaySeconds: 30
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 3200
                      initialDelaySeconds: 10
                      periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
    name: admin
    namespace: splits-network
spec:
    type: ClusterIP
    ports:
        - port: 80
          targetPort: 3200
          name: http
    selector:
        app: admin
