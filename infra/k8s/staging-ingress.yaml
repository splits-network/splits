apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
    name: splits-network-ingress
    namespace: splits-network
    annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
        nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
        nginx.ingress.kubernetes.io/ssl-protocols: "TLSv1.2 TLSv1.3"
        nginx.ingress.kubernetes.io/ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"
        # WebSocket support for chat and analytics gateways
        nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
        nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
spec:
    ingressClassName: nginx
    tls:
        - hosts:
              - staging.splits.network
              - api.staging.splits.network
              - api.staging.applicant.network
              - staging.applicant.network
              - staging.employment-networks.com
              - status.staging.splits.network
              - status.staging.employment-networks.com
              - admin.staging.employment-networks.com
              - admin.api.staging.employment-networks.com
              - video.staging.splits.network
              - video.staging.applicant.network
          secretName: splits-network-tls
    rules:
        - host: staging.splits.network
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: portal
                            port:
                                number: 80
        - host: staging.applicant.network
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: candidate
                            port:
                                number: 80
        - host: api.staging.splits.network
          http:
              paths:
                  - path: /ws/chat
                    pathType: Prefix
                    backend:
                        service:
                            name: chat-gateway
                            port:
                                number: 80
                  - path: /ws/analytics
                    pathType: Prefix
                    backend:
                        service:
                            name: analytics-gateway
                            port:
                                number: 80
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: api-gateway
                            port:
                                number: 80
        - host: api.staging.applicant.network
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: api-gateway
                            port:
                                number: 80
        - host: staging.employment-networks.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: corporate
                            port:
                                number: 80
        - host: status.staging.splits.network
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: status
                            port:
                                number: 80
        - host: status.staging.employment-networks.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: status
                            port:
                                number: 80
        - host: admin.staging.employment-networks.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: admin
                            port:
                                number: 80
        - host: admin.api.staging.employment-networks.com
          http:
              paths:
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: admin-gateway
                            port:
                                number: 80
        - host: video.staging.splits.network
          http:
              paths:
                  - path: /rtc
                    pathType: Prefix
                    backend:
                        service:
                            name: livekit-server
                            port:
                                number: 80
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: video
                            port:
                                number: 80
        - host: video.staging.applicant.network
          http:
              paths:
                  - path: /rtc
                    pathType: Prefix
                    backend:
                        service:
                            name: livekit-server
                            port:
                                number: 80
                  - path: /
                    pathType: Prefix
                    backend:
                        service:
                            name: video
                            port:
                                number: 80
