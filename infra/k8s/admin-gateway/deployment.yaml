apiVersion: apps/v1
kind: Deployment
metadata:
    name: admin-gateway
    namespace: splits-network
spec:
    replicas: 1
    selector:
        matchLabels:
            app: admin-gateway
    template:
        metadata:
            labels:
                app: admin-gateway
        spec:
            containers:
                - name: admin-gateway
                  image: ${ACR_SERVER}/admin-gateway:${IMAGE_TAG}
                  ports:
                      - containerPort: 3030
                        name: http
                  env:
                      - name: NODE_ENV
                        value: "production"
                      - name: PORT
                        value: "3030"
                      - name: CORS_ORIGIN
                        value: "https://admin.employment-networks.com"
                      - name: ADMIN_CLERK_SECRET_KEY
                        valueFrom:
                            secretKeyRef:
                                name: clerk-secrets
                                key: admin-clerk-secret-key
                      - name: SUPABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-url
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-service-role-key
                      - name: REDIS_HOST
                        value: "redis"
                      - name: REDIS_PORT
                        value: "6379"
                      - name: IDENTITY_SERVICE_URL
                        value: "http://identity-service:3001"
                      - name: ATS_SERVICE_URL
                        value: "http://ats-service:3002"
                      - name: NETWORK_SERVICE_URL
                        value: "http://network-service:3003"
                      - name: BILLING_SERVICE_URL
                        value: "http://billing-service:3004"
                      - name: NOTIFICATION_SERVICE_URL
                        value: "http://notification-service:3005"
                      - name: DOCUMENT_SERVICE_URL
                        value: "http://document-service:3006"
                      - name: AUTOMATION_SERVICE_URL
                        value: "http://automation-service:3007"
                      - name: DOCUMENT_PROCESSING_SERVICE_URL
                        value: "http://document-processing-service:3008"
                      - name: AI_SERVICE_URL
                        value: "http://ai-service:3009"
                      - name: ANALYTICS_SERVICE_URL
                        value: "http://analytics-service:3010"
                      - name: CONTENT_SERVICE_URL
                        value: "http://content-service:3015"
                      - name: INTEGRATION_SERVICE_URL
                        value: "http://integration-service:80"
                      - name: MATCHING_SERVICE_URL
                        value: "http://matching-service:80"
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3030
                      initialDelaySeconds: 30
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 3030
                      initialDelaySeconds: 10
                      periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
    name: admin-gateway
    namespace: splits-network
spec:
    type: ClusterIP
    ports:
        - port: 80
          targetPort: 3030
          name: http
    selector:
        app: admin-gateway
