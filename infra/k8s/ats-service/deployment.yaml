apiVersion: apps/v1
kind: Deployment
metadata:
    name: ats-service
    namespace: splits-network
spec:
    replicas: ${REPLICAS}
    selector:
        matchLabels:
            app: ats-service
    template:
        metadata:
            labels:
                app: ats-service
        spec:
            nodeSelector:
                agentpool: userpool
            tolerations:
                - key: "kubernetes.azure.com/scalesetpriority"
                  operator: "Equal"
                  value: "spot"
                  effect: "NoSchedule"
            containers:
                - name: ats-service
                  image: ${ACR_SERVER}/ats-service:${IMAGE_TAG}
                  ports:
                      - containerPort: 3002
                        name: http
                  env:
                      - name: NODE_ENV
                        value: "production"
                      - name: PORT
                        value: "3002"
                      - name: SENTRY_DSN
                        value: "https://8e881b88655d722664be86c56671b871@o4510570789732352.ingest.us.sentry.io/4510570905206784"
                      - name: SUPABASE_URL
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-url
                      - name: SUPABASE_ANON_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-anon-key
                      - name: SUPABASE_SERVICE_ROLE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: supabase-secrets
                                key: supabase-service-role-key
                      - name: RABBITMQ_URL
                        value: "amqp://splits:splits_production@rabbitmq:5672"
                      - name: INTERNAL_SERVICE_KEY
                        valueFrom:
                            secretKeyRef:
                                name: internal-service-secrets
                                key: internal-service-key
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
                  livenessProbe:
                      httpGet:
                          path: /health
                          port: 3002
                      initialDelaySeconds: 60
                      periodSeconds: 10
                      timeoutSeconds: 5
                      failureThreshold: 3
                  readinessProbe:
                      httpGet:
                          path: /health
                          port: 3002
                      initialDelaySeconds: 15
                      periodSeconds: 5
                      timeoutSeconds: 5
                      failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
    name: ats-service
    namespace: splits-network
spec:
    type: ClusterIP
    ports:
        - port: 3002
          targetPort: 3002
          name: http
    selector:
        app: ats-service
