apiVersion: batch/v1
kind: CronJob
metadata:
    name: ats-auto-transition-job-statuses
    namespace: splits-network
    labels:
        app: ats-service
        component: cron
spec:
    # Every 5 minutes
    schedule: "*/5 * * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    concurrencyPolicy: Forbid
    jobTemplate:
        spec:
            activeDeadlineSeconds: 600
            backoffLimit: 0
            template:
                metadata:
                    labels:
                        app: ats-service
                        component: cron-job
                spec:
                    nodeSelector:
                        agentpool: userpool
                    tolerations:
                        - key: "kubernetes.azure.com/scalesetpriority"
                          operator: "Equal"
                          value: "spot"
                          effect: "NoSchedule"
                    restartPolicy: Never
                    containers:
                        - name: ats-auto-transition-job-statuses
                          image: ${ACR_SERVER}/ats-service:${IMAGE_TAG}
                          imagePullPolicy: Always
                          command: ["node"]
                          args:
                              [
                                  "/app/services/ats-service/dist/jobs/auto-transition-job-statuses.js",
                              ]
                          env:
                              - name: SUPABASE_URL
                                valueFrom:
                                    secretKeyRef:
                                        name: supabase-secrets
                                        key: supabase-url
                              - name: SUPABASE_SERVICE_ROLE_KEY
                                valueFrom:
                                    secretKeyRef:
                                        name: supabase-secrets
                                        key: supabase-service-role-key
                              - name: RABBITMQ_URL
                                value: "amqp://splits:splits_production@rabbitmq:5672"
                              - name: SENTRY_DSN
                                value: "https://8e881b88655d722664be86c56671b871@o4510570789732352.ingest.us.sentry.io/4510570905206784"
                              - name: NODE_ENV
                                value: "production"
                              - name: LOG_LEVEL
                                value: "info"
