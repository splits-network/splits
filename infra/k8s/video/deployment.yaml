apiVersion: apps/v1
kind: Deployment
metadata:
    name: video
    namespace: splits-network
spec:
    replicas: ${REPLICAS:-2}
    selector:
        matchLabels:
            app: video
    template:
        metadata:
            labels:
                app: video
        spec:
            nodeSelector:
                agentpool: userpool
            tolerations:
                - key: "kubernetes.azure.com/scalesetpriority"
                  operator: "Equal"
                  value: "spot"
                  effect: "NoSchedule"
            containers:
                - name: video
                  image: ${ACR_SERVER}/video:${IMAGE_TAG}
                  ports:
                      - containerPort: 3104
                        name: http
                  env:
                      - name: NODE_ENV
                        value: "production"
                      - name: PORT
                        value: "3104"
                      - name: NEXT_PUBLIC_API_URL
                        value: "${API_BASE_URL}"
                      - name: NEXT_PUBLIC_LIVEKIT_URL
                        value: "${LIVEKIT_PUBLIC_URL:-wss://livekit.splitsnetwork.com}"
                  resources:
                      requests:
                          cpu: 100m
                          memory: 128Mi
                      limits:
                          cpu: 500m
                          memory: 512Mi
                  livenessProbe:
                      httpGet:
                          path: /
                          port: 3104
                      initialDelaySeconds: 30
                      periodSeconds: 10
                  readinessProbe:
                      httpGet:
                          path: /
                          port: 3104
                      initialDelaySeconds: 10
                      periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
    name: video
    namespace: splits-network
spec:
    type: ClusterIP
    ports:
        - port: 80
          targetPort: 3104
          name: http
    selector:
        app: video
