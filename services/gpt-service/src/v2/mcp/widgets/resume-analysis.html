<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Analysis</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font-sans, system-ui, -apple-system, sans-serif);
    background: var(--color-background-primary, #fff);
    color: var(--color-text-primary, #1a1a1a);
    padding: 16px;
    line-height: 1.5;
  }
  .loading { text-align: center; padding: 40px; color: var(--color-text-secondary, #666); }
  h2 { font-size: var(--font-heading-sm-size, 18px); font-weight: var(--font-weight-bold, 700); margin-bottom: 4px; }
  .subtitle { font-size: var(--font-text-sm-size, 13px); color: var(--color-text-secondary, #666); margin-bottom: 16px; }

  .score-section { text-align: center; margin-bottom: 20px; }
  .score-ring {
    position: relative; display: inline-block;
    width: 100px; height: 100px;
  }
  .score-ring svg { transform: rotate(-90deg); }
  .score-ring circle {
    fill: none; stroke-width: 8;
    stroke-linecap: round;
  }
  .score-bg { stroke: var(--color-border-secondary, #e5e5e5); }
  .score-fill { transition: stroke-dashoffset 0.8s ease; }
  .score-value {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: var(--font-weight-bold, 700);
  }
  .score-label {
    font-size: var(--font-text-sm-size, 13px);
    color: var(--color-text-secondary, #666);
    margin-top: 4px;
  }

  .section { margin-bottom: 16px; }
  .section-title {
    font-size: var(--font-text-sm-size, 13px);
    font-weight: var(--font-weight-semibold, 600);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--color-text-secondary, #666);
    margin-bottom: 8px;
  }
  .item-list { list-style: none; }
  .item {
    padding: 6px 10px;
    border-radius: var(--border-radius-sm, 4px);
    font-size: var(--font-text-sm-size, 13px);
    margin-bottom: 4px;
  }
  .strength { background: var(--color-background-success, #dcfce7); color: var(--color-text-success, #166534); }
  .gap { background: var(--color-background-danger, #fef2f2); color: var(--color-text-danger, #991b1b); }
  .recommendation {
    background: var(--color-background-secondary, #f9fafb);
    border-radius: var(--border-radius-md, 8px);
    padding: 12px;
    font-size: var(--font-text-sm-size, 14px);
  }
  .summary {
    font-size: var(--font-text-sm-size, 14px);
    color: var(--color-text-secondary, #666);
    margin-bottom: 16px;
  }
  .actions { display: flex; gap: 8px; margin-top: 16px; }
  .btn {
    padding: 8px 16px;
    border-radius: var(--border-radius-md, 8px);
    border: 1px solid var(--color-border-primary, #e5e5e5);
    background: var(--color-background-primary, #fff);
    color: var(--color-text-primary, #1a1a1a);
    font-size: var(--font-text-sm-size, 13px);
    font-weight: var(--font-weight-medium, 500);
    cursor: pointer;
  }
  .btn:hover { background: var(--color-background-secondary, #f5f5f5); }
  .btn-primary {
    background: var(--color-background-info, #3b82f6);
    color: var(--color-text-inverse, #fff);
    border-color: transparent;
  }
  .btn-primary:hover { opacity: 0.9; }
</style>
</head>
<body>
<div id="root"><div class="loading">Analyzing resume...</div></div>

<script>
(function() {
  const root = document.getElementById('root');

  window.addEventListener('message', (event) => {
    const msg = event.data;
    if (!msg || typeof msg !== 'object') return;

    if (msg.method === 'ui/notifications/tool-result' && msg.params?.structuredContent) {
      render(msg.params.structuredContent);
    }

    if (msg.method === 'ui/notifications/tool-input') {
      root.innerHTML = '<div class="loading">Analyzing resume...</div>';
    }
  });

  function render(data) {
    if (!data || data.fit_score === undefined) {
      root.innerHTML = '<div class="loading">No analysis data available.</div>';
      return;
    }

    const score = data.fit_score;
    const circumference = 2 * Math.PI * 42;
    const offset = circumference - (score / 100) * circumference;
    const scoreColor = score >= 70 ? 'var(--color-text-success, #16a34a)'
      : score >= 40 ? 'var(--color-text-warning, #d97706)'
      : 'var(--color-text-danger, #dc2626)';

    let html = `
      <h2>Resume Analysis</h2>
      <div class="subtitle">${esc(data.job_title || '')} at ${esc(data.company_name || '')}</div>

      <div class="score-section">
        <div class="score-ring">
          <svg width="100" height="100" viewBox="0 0 100 100">
            <circle class="score-bg" cx="50" cy="50" r="42"/>
            <circle class="score-fill" cx="50" cy="50" r="42"
              stroke="${scoreColor}"
              stroke-dasharray="${circumference}"
              stroke-dashoffset="${offset}"/>
          </svg>
          <div class="score-value" style="color: ${scoreColor}">${score}</div>
        </div>
        <div class="score-label">Fit Score</div>
      </div>`;

    if (data.overall_summary) {
      html += `<div class="summary">${esc(data.overall_summary)}</div>`;
    }

    if (data.strengths?.length) {
      html += `
        <div class="section">
          <div class="section-title">Strengths (${data.strengths.length})</div>
          <ul class="item-list">
            ${data.strengths.map(s => `<li class="item strength">${esc(s)}</li>`).join('')}
          </ul>
        </div>`;
    }

    if (data.gaps?.length) {
      html += `
        <div class="section">
          <div class="section-title">Gaps (${data.gaps.length})</div>
          <ul class="item-list">
            ${data.gaps.map(g => `<li class="item gap">${esc(g)}</li>`).join('')}
          </ul>
        </div>`;
    }

    if (data.recommendation) {
      html += `
        <div class="section">
          <div class="section-title">Recommendation</div>
          <div class="recommendation">${esc(data.recommendation)}</div>
        </div>`;
    }

    // Action: apply
    if (data.job_title) {
      html += `
        <div class="actions">
          <button class="btn btn-primary" onclick="applyNow()">Apply Now</button>
        </div>`;
    }

    root.innerHTML = html;

    // Store job_id from parent context for apply button
    root.dataset.jobId = data.job_id || '';
  }

  window.applyNow = function() {
    const jobId = root.dataset.jobId;
    if (!jobId) return;
    window.parent.postMessage({
      jsonrpc: '2.0', id: Date.now(),
      method: 'tools/call',
      params: { name: 'submit_application', arguments: { job_id: jobId } },
    }, '*');
  };

  function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = String(str);
    return div.innerHTML;
  }
})();
</script>
</body>
</html>
